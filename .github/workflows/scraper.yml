name: Daily News Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8:00 AM UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install requests

      # Step 4: Run the scraper
      - name: Run scraper
        run: python scraper.py

      - name: Push changes
        run: |
            git pull --rebase origin main
            git push origin main

        

      # Step 5: Commit and push the updated JSON back to the repo
      - name: Commit updated headlines
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add headlines.json
          git diff --cached --quiet || git commit -m "chore: update headlines $(date -u '+%Y-%m-%d')"
          git push
